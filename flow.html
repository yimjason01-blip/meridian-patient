<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Meridian · Setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #000;
    --surface: #1a1a1d;
    --surface-strong: #232327;
    --border: #2a2a2e;
    --text: #fff;
    --text-muted: #8a8a90;
    --text-faint: #555;
    --accent: #fff;
    --good: #4ade80;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    font-feature-settings:"ss01","cv11"; -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  body { min-height: 100vh; min-height: 100dvh; }

  .shell { position:relative; width:100vw; max-width:430px; margin:0 auto;
    min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; }

  .statusbar { height:44px; flex-shrink:0; display:flex; align-items:center;
    justify-content:space-between; padding:0 24px;
    font-size:15px; font-weight:600; letter-spacing:-0.01em; }
  .statusbar .right { display:flex; align-items:center; gap:5px; }
  .statusbar .right span { width:5px; height:5px; border-radius:50%; background:var(--text); }

  .topbar { padding:4px 16px 0; flex-shrink:0; }
  .back-btn { background:none; border:none; color:var(--text); font-size:22px;
    padding:8px 4px; cursor:pointer; line-height:1; }

  .progress { display:flex; gap:6px; padding:12px 24px 0; }
  .progress i { flex:1; height:3px; border-radius:2px; background:#2a2a2e; }
  .progress i.done { background:#fff; }

  main { flex:1; padding:28px 24px 120px; }
  h1 { font-size:28px; font-weight:600; line-height:1.18; letter-spacing:-0.02em;
    margin:8px 0 12px; }
  .lede { color:var(--text-muted); font-size:15.5px; line-height:1.5; margin:0 0 28px; }

  .card-list { display:flex; flex-direction:column; gap:10px; }
  .card { background:var(--surface); border:1.5px solid var(--border); border-radius:14px;
    padding:16px 18px; display:flex; align-items:center; gap:14px; cursor:pointer;
    position:relative;
    transition:transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease; }
  .card:active { transform:scale(0.985); }
  .card.selected { background:#ffffff; border-color:#ffffff;
    box-shadow:0 0 0 4px rgba(255,255,255,0.16); }
  .card.selected .card-title { color:#000; }
  .card.selected .card-sub   { color:#3a3a3a; }
  .card.selected .card-icon  { background:#000; color:#fff; }
  .card.selected .chev       { color:#000; }
  .card.selected .check      { opacity:1; }

  .card-icon { width:38px; height:38px; border-radius:10px; background:var(--surface-strong);
    display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#cfcfd4; }
  .card-icon svg { width:20px; height:20px; }
  .card-body { flex:1; min-width:0; }
  .card-title { font-size:15.5px; font-weight:600; letter-spacing:-0.01em; }
  .card-sub { font-size:13px; color:var(--text-muted); margin-top:2px; }
  .check { width:22px; height:22px; border-radius:50%; background:var(--good); color:#000;
    display:flex; align-items:center; justify-content:center; flex-shrink:0; opacity:0;
    transition:opacity .15s ease; }
  .check svg { width:13px; height:13px; }
  .chev { color:var(--text-faint); font-size:22px; line-height:1; padding-left:4px; }

  .field { display:flex; flex-direction:column; gap:6px; margin-bottom:18px; }
  .field label { font-size:13px; color:var(--text-muted); font-weight:500;
    text-transform:uppercase; letter-spacing:0.06em; }
  .field input { background:var(--surface); border:1px solid var(--border); color:var(--text);
    border-radius:12px; padding:14px 16px; font:inherit; font-size:15.5px; outline:none; }
  .field input:focus { border-color:#3a3a40; background:var(--surface-strong); }

  .footer { position:fixed; left:0; right:0; bottom:0; padding:16px 24px 28px;
    background:linear-gradient(to top, #000 60%, rgba(0,0,0,0));
    pointer-events:none; }
  .footer .inner { max-width:430px; margin:0 auto; pointer-events:auto; }
  .cta { width:100%; background:#fff; color:#000; border:none; border-radius:999px;
    padding:16px; font:inherit; font-size:16px; font-weight:600; letter-spacing:-0.01em;
    cursor:pointer; }
  .cta:disabled { background:#2a2a2e; color:#555; cursor:default; }

  .success { display:flex; flex-direction:column; align-items:center;
    text-align:center; padding-top:60px; }
  .success-mark { width:72px; height:72px; border-radius:50%; background:var(--good);
    color:#000; display:flex; align-items:center; justify-content:center; margin-bottom:24px; }
  .success-mark svg { width:34px; height:34px; }
  .success h1 { margin-bottom:10px; }
  .success p { color:var(--text-muted); font-size:15.5px; line-height:1.5; max-width:320px; }

  @keyframes fade { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  .screen { animation:fade .25s ease-out; }

  /* === HealthKit modal sheet === */
  .hk-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:50;
    display:flex; align-items:flex-end; justify-content:center; animation:fade .2s ease-out; }
  .hk-sheet {
    width:100%; max-width:430px; background:#F2F2F7; color:#000;
    border-top-left-radius:14px; border-top-right-radius:14px;
    max-height:92vh; display:flex; flex-direction:column;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',sans-serif;
    animation: slideUp .3s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes slideUp { from{transform:translateY(100%);} to{transform:none;} }
  .hk-nav { display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; border-bottom:0.5px solid rgba(60,60,67,0.18);
    background:#F2F2F7; border-radius:14px 14px 0 0; }
  .hk-nav button { background:none; border:none; color:#007AFF; font:inherit;
    font-size:17px; padding:6px 0; cursor:pointer; -webkit-appearance:none; }
  .hk-nav .right { font-weight:600; }
  .hk-scroll { overflow-y:auto; padding:24px 0 32px; flex:1; }
  .hk-hero { display:flex; flex-direction:column; align-items:center; padding:8px 24px 22px; }
  .hk-heart {
    width:60px; height:60px; border-radius:14px;
    background:linear-gradient(135deg,#FF6481 0%, #FF1F50 100%);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 14px rgba(255,32,80,0.28); margin-bottom:12px;
  }
  .hk-heart svg { width:34px; height:34px; color:#fff; }
  .hk-title { font-size:22px; font-weight:700; letter-spacing:-0.02em; }
  .hk-sub   { font-size:14px; color:#3C3C43; opacity:0.7; text-align:center;
    margin-top:8px; line-height:1.4; padding:0 12px; }
  .hk-section-header { font-size:13px; color:#3C3C43; opacity:0.6;
    text-transform:uppercase; letter-spacing:0.06em; font-weight:500;
    padding:24px 32px 6px; }
  .hk-group { background:#fff; margin:0 16px; border-radius:10px; overflow:hidden; }
  .hk-row { display:flex; align-items:center; gap:12px; padding:11px 16px;
    border-bottom:0.5px solid rgba(60,60,67,0.18); min-height:44px; }
  .hk-row:last-child { border-bottom:none; }
  .hk-row-icon { width:28px; height:28px; border-radius:7px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; color:#fff; }
  .hk-row-icon svg { width:17px; height:17px; }
  .hk-row-label { flex:1; font-size:16px; letter-spacing:-0.01em; }
  .hk-row.master .hk-row-label { font-weight:600; }
  .hk-toggle {
    width:51px; height:31px; border-radius:31px; background:#E9E9EA;
    position:relative; cursor:pointer; transition:background .2s ease;
    flex-shrink:0;
  }
  .hk-toggle::after {
    content:''; position:absolute; top:2px; left:2px; width:27px; height:27px;
    border-radius:50%; background:#fff; transition:transform .2s ease;
    box-shadow:0 3px 8px rgba(0,0,0,0.15), 0 1px 1px rgba(0,0,0,0.06);
  }
  .hk-toggle.on { background:#34C759; }
  .hk-toggle.on::after { transform:translateX(20px); }
  .hk-footer-note { font-size:13px; color:#3C3C43; opacity:0.6;
    padding:8px 32px 0; line-height:1.4; }

  /* === OAuth Safari-style sheet === */
  .ow-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:50;
    display:flex; align-items:flex-end; justify-content:center; animation:fade .2s ease-out; }
  .ow-sheet {
    width:100%; max-width:430px; background:#fff; color:#1c1c1e;
    border-top-left-radius:14px; border-top-right-radius:14px;
    max-height:92vh; display:flex; flex-direction:column;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Inter',sans-serif;
    animation: slideUp .3s cubic-bezier(.2,.8,.2,1); overflow:hidden;
  }
  .ow-urlbar { background:#F2F2F7; padding:10px 14px; display:flex; align-items:center;
    gap:8px; border-bottom:0.5px solid rgba(60,60,67,0.18); }
  .ow-cancel { background:none; border:none; color:#007AFF; font:inherit;
    font-size:15px; padding:6px 8px; cursor:pointer; }
  .ow-url { flex:1; background:#fff; border:0.5px solid rgba(60,60,67,0.18);
    border-radius:8px; padding:7px 10px; font-size:14px;
    color:#1c1c1e; display:flex; align-items:center; gap:6px;
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif; }
  .ow-url .lock { font-size:11px; color:#1c1c1e; }
  .ow-body { flex:1; overflow-y:auto; padding:32px 28px 28px;
    display:flex; flex-direction:column; }
  .ow-brand { display:flex; flex-direction:column; align-items:center; margin-bottom:24px; }
  .ow-brand-mark { width:54px; height:54px; border-radius:12px; display:flex;
    align-items:center; justify-content:center; color:#fff; margin-bottom:14px; }
  .ow-brand-mark svg { width:30px; height:30px; }
  .ow-brand-name { font-size:18px; font-weight:600; letter-spacing:-0.01em; }
  .ow-h { font-size:20px; font-weight:600; letter-spacing:-0.02em;
    margin:0 0 6px; line-height:1.25; }
  .ow-p { font-size:14.5px; color:#3C3C43; line-height:1.5; margin:0 0 18px; }
  .ow-scopes { background:#F8F8FA; border:0.5px solid rgba(60,60,67,0.14);
    border-radius:10px; padding:14px 16px; margin-bottom:22px; }
  .ow-scopes-title { font-size:13px; color:#3C3C43; opacity:0.7;
    text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px; }
  .ow-scopes ul { margin:0; padding:0; list-style:none; display:flex;
    flex-direction:column; gap:8px; }
  .ow-scopes li { display:flex; align-items:center; gap:10px; font-size:14.5px; }
  .ow-scopes li svg { width:16px; height:16px; color:#34C759; flex-shrink:0; }
  .ow-actions { display:flex; gap:10px; margin-top:auto; }
  .ow-btn { flex:1; border:none; border-radius:10px; padding:14px;
    font:inherit; font-size:16px; font-weight:600; cursor:pointer; }
  .ow-btn.primary { color:#fff; }
  .ow-btn.secondary { background:#F2F2F7; color:#1c1c1e; }
</style>
</head>
<body>
<div class="shell">
  <div class="statusbar">
    <div>9:41</div>
    <div class="right"><span></span><span></span><span></span></div>
  </div>
  <div class="topbar">
    <button class="back-btn" id="back" aria-label="Back">‹</button>
  </div>
  <div class="progress" id="progress"></div>

  <main id="main"></main>

  <div class="footer">
    <div class="inner">
      <button class="cta" id="cta" disabled>Continue</button>
    </div>
  </div>
</div>

<script>
const FLOWS = {
  genetic: {
    label: 'Genetic Analysis Kit',
    steps: [
      {
        kind: 'choice',
        title: 'Genetic analysis kit.',
        lede: 'Galleri whole-genome screening plus ACMG-SF v3.2 actionable variants. Pick how you want to start.',
        options: [
          { id:'order', title:'Send a kit to my address', sub:'Saliva. Ships in 2 business days.', icon:icon('box') },
          { id:'skip',  title:'Skip for now',               sub:"You can do this later from your profile.",   icon:icon('clock') }
        ]
      },
      {
        kind: 'address',
        when: ctx => ctx.choice === 'order',
        title: 'Where should we ship the kit?',
        lede: 'Saliva collection. Pre-paid return label included.'
      },
      {
        kind: 'success',
        title: ctx => ctx.choice === 'order' ? 'Kit on the way.' : 'Marked for later.',
        body:  ctx => ctx.choice === 'order'
          ? 'Tracking will appear in your inbox within 24 hours. Results land in your record about 4 weeks after we receive your sample.'
          : "We'll keep this open. You can reopen it from your profile any time."
      }
    ]
  },

  wearables: {
    label: 'Wearables',
    steps: [
      {
        kind: 'choice',
        title: 'Connect a wearable.',
        lede: 'We use HRV, resting HR, sleep, and VO2max to track your trajectory between visits. You can connect more later.',
        options: [
          { id:'apple',   title:'Apple Health',   sub:'Watch, iPhone, Health app',  icon:icon('apple'),  auth:'healthkit' },
          { id:'garmin',  title:'Garmin Connect', sub:'Forerunner, Edge, Fenix',    icon:icon('watch'),  auth:'oauth', brand:'Garmin Connect', host:'connect.garmin.com',     accent:'#007CC3' },
          { id:'whoop',   title:'WHOOP',          sub:'Strap 4.0',                  icon:icon('strap'),  auth:'oauth', brand:'WHOOP',          host:'api.prod.whoop.com',     accent:'#000000' },
          { id:'oura',    title:'Oura',           sub:'Ring Gen 3 / Gen 4',         icon:icon('ring'),   auth:'oauth', brand:'Oura',           host:'cloud.ouraring.com',     accent:'#0F0F0F' },
          { id:'fitbit',  title:'Fitbit',         sub:'Sense, Charge, Inspire',     icon:icon('watch'),  auth:'oauth', brand:'Fitbit',         host:'fitbit.com',             accent:'#00B0B9' }
        ]
      },
      { kind: 'healthkit', when: ctx => ctx.choice === 'apple' },
      { kind: 'oauth',     when: ctx => ctx.choice && ctx.choice !== 'apple' },
      {
        kind: 'success',
        title: ctx => `Connected to ${WEARABLE_NAME[ctx.choice]||'your wearable'}.`,
        body:  ctx => ctx.choice === 'apple'
          ? "We will start streaming Heart Rate, HRV, VO2 Max, Sleep, and Workouts tonight. You can change permissions any time in the Health app under Sharing → Apps."
          : `We will start syncing tonight. Manage this connection any time from your Meridian profile.`
      }
    ]
  },

  physician: {
    label: 'Meet your physician',
    steps: [
      {
        kind: 'choice',
        title: 'Pick your physician.',
        lede: 'Your Meridian physician is your dedicated point of contact for prevention, results review, and care coordination.',
        options: [
          { id:'mizani', title:'Dr. Sara Mizani', sub:'Internal medicine. CA, TX, IMLC. Founding physician.', icon:icon('person') },
          { id:'wong',   title:'Dr. Marcus Wong', sub:'Internal medicine. Cardiometabolic focus.',           icon:icon('person') },
          { id:'kapoor', title:'Dr. Priya Kapoor',sub:'Internal medicine. Oncology screening focus.',        icon:icon('person') }
        ]
      },
      {
        kind: 'choice',
        when: ctx => !!ctx.choice,
        title: 'Pick a time for your intro call.',
        lede: '30 minutes. Video. Bring questions.',
        slotsForChoice: true
      },
      {
        kind: 'success',
        title: 'Intro call booked.',
        body:  ctx => `You'll meet ${PHY_NAME[ctx.choice]||'your physician'} on ${ctx.slot||'your selected time'}. A calendar invite is in your inbox.`
      }
    ]
  },

  labs: {
    label: 'Blood Labs',
    steps: [
      {
        kind: 'choice',
        title: 'Blood labs.',
        lede: 'Quest Elite Health panel: about 70 analytes including ApoB, Lp(a), HbA1c, full lipid, comprehensive metabolic, hs-CRP, ferritin.',
        options: [
          { id:'mobile',   title:'At-home draw',           sub:'Phlebotomist comes to you. Free.', icon:icon('home') },
          { id:'location', title:'Use a Quest location',   sub:'2,200 locations nationwide.',      icon:icon('pin')  },
          { id:'upload',   title:'Upload existing results',sub:'Within the last 90 days.',         icon:icon('file') }
        ]
      },
      {
        kind: 'address',
        when: ctx => ctx.choice === 'mobile',
        title: 'Where should the phlebotomist come?',
        lede: 'Morning slots fill first. Fast 10 hours before your draw.'
      },
      {
        kind: 'zip',
        when: ctx => ctx.choice === 'location',
        title: "What's your ZIP code?",
        lede: "We'll find the closest Quest locations."
      },
      {
        kind: 'success',
        title: ctx => ctx.choice === 'upload' ? 'Results received.'
                    : ctx.choice === 'location' ? 'Order sent to Quest.'
                    : 'Draw scheduled.',
        body:  ctx => ctx.choice === 'upload'
          ? 'Your file is being parsed. Results will appear in your record within 24 hours.'
          : ctx.choice === 'location'
            ? 'Walk in any time in the next 14 days. Bring photo ID. Fast 10 hours before.'
            : "We'll text you to confirm a time window within 24 hours."
      }
    ]
  }
};

const PHY_NAME = {
  mizani: 'Dr. Mizani', wong: 'Dr. Wong', kapoor: 'Dr. Kapoor'
};
const WEARABLE_NAME = {
  apple: 'Apple Health', garmin: 'Garmin Connect', whoop: 'WHOOP', oura: 'Oura', fitbit: 'Fitbit'
};

function icon(name) {
  const s = (p) => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
  switch(name) {
    case 'box':    return s('<path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7"/><path d="M12 11v10"/>');
    case 'file':   return s('<path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/>');
    case 'clock':  return s('<circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/>');
    case 'apple':  return s('<path d="M16 13c0-3 2-4 2-4-1-2-3-2-4-2-1 0-2 1-3 1s-2-1-3-1c-2 0-4 1-4 5 0 4 3 8 5 8 1 0 2-1 3-1s2 1 3 1c1 0 3-2 4-4-1 0-3-1-3-3z"/><path d="M13 4c0-1 1-2 2-2 0 1-1 2-2 2z"/>');
    case 'watch':  return s('<rect x="6" y="6" width="12" height="12" rx="3"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><path d="M9 18v2a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-2"/>');
    case 'strap':  return s('<rect x="5" y="9" width="14" height="6" rx="2"/><path d="M3 12h2M19 12h2"/>');
    case 'ring':   return s('<circle cx="12" cy="13" r="6"/><path d="M9 7h6"/>');
    case 'person': return s('<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/>');
    case 'home':   return s('<path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/>');
    case 'pin':    return s('<path d="M12 22s7-7 7-13a7 7 0 0 0-14 0c0 6 7 13 7 13z"/><circle cx="12" cy="9" r="2.5"/>');
    case 'heart':  return s('<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="currentColor" stroke="none"/>');
    case 'lungs':  return s('<path d="M12 4v8"/><path d="M12 12c-2 0-3 1.5-3 4v2a2 2 0 0 1-4 0v-3c0-3 2-7 5-7"/><path d="M12 12c2 0 3 1.5 3 4v2a2 2 0 0 0 4 0v-3c0-3-2-7-5-7"/>');
    case 'bed':    return s('<path d="M3 18v-7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v7"/><path d="M3 14h18"/><path d="M7 10V8a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1v2"/>');
    case 'flame':  return s('<path d="M12 2s-4 4-4 9a4 4 0 0 0 8 0c0-2-1-3-2-4 0 2-1 3-2 3 0-3 0-5 0-8z" fill="currentColor" stroke="none"/>');
    case 'grid':   return s('<rect x="4" y="4" width="7" height="7" rx="1.5"/><rect x="13" y="4" width="7" height="7" rx="1.5"/><rect x="4" y="13" width="7" height="7" rx="1.5"/><rect x="13" y="13" width="7" height="7" rx="1.5"/>');
    case 'check':  return s('<polyline points="5 12 10 17 19 7"/>');
  }
  return '';
}
const TIME_SLOTS = ['Tomorrow, 9:00 AM','Tomorrow, 2:30 PM','Thu, 11:00 AM','Fri, 4:00 PM'];

const params = new URLSearchParams(location.search);
const flowId = params.get('id');
const flow = FLOWS[flowId];
if (!flow) { location.replace('health-picture.html'); }

const ctx = { selected: [] };
let stepIdx = 0;

const mainEl = document.getElementById('main');
const ctaEl = document.getElementById('cta');
const backEl = document.getElementById('back');
const progressEl = document.getElementById('progress');

function visibleSteps() {
  return flow.steps.filter(s => !s.when || s.when(ctx));
}
function renderProgress() {
  const total = visibleSteps().length;
  const done = visibleSteps().slice(0, stepIdx).length;
  progressEl.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const el = document.createElement('i');
    if (i < done) el.classList.add('done');
    progressEl.appendChild(el);
  }
}
function setCta(label, enabled, handler) {
  ctaEl.textContent = label;
  ctaEl.disabled = !enabled;
  ctaEl.onclick = enabled ? handler : null;
}

function render() {
  const steps = visibleSteps();
  if (stepIdx >= steps.length) { complete(); return; }
  const step = steps[stepIdx];
  renderProgress();
  mainEl.innerHTML = '';
  mainEl.classList.remove('screen'); void mainEl.offsetWidth; mainEl.classList.add('screen');

  if (step.kind === 'choice' || step.kind === 'multi') return renderOptions(step);
  if (step.kind === 'address') return renderAddress(step);
  if (step.kind === 'zip')     return renderZip(step);
  if (step.kind === 'healthkit') return renderHealthKit(step);
  if (step.kind === 'oauth')     return renderOAuth(step);
  if (step.kind === 'success') return renderSuccess(step);
}

function resolveTitle(t) { return typeof t === 'function' ? t(ctx) : t; }

function renderOptions(step) {
  const title = resolveTitle(step.title);
  const lede  = resolveTitle(step.lede || '');
  let options = step.options;
  if (step.slotsForChoice) {
    options = TIME_SLOTS.map(t => ({ id:t, title:t, icon:icon('clock') }));
  }
  mainEl.innerHTML = `
    <h1>${title}</h1>
    ${lede ? `<p class="lede">${lede}</p>` : ''}
    <div class="card-list" id="cards"></div>
  `;
  const list = mainEl.querySelector('#cards');
  options.forEach(opt => {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `
      <div class="card-icon">${opt.icon || ''}</div>
      <div class="card-body">
        <div class="card-title">${opt.title}</div>
        ${opt.sub ? `<div class="card-sub">${opt.sub}</div>` : ''}
      </div>
      ${step.kind === 'multi'
        ? `<div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 10 17 19 7"/></svg></div>`
        : `<div class="chev">›</div>`}
    `;
    el.onclick = () => {
      if (step.kind === 'multi') {
        ctx.selected = ctx.selected || [];
        const i = ctx.selected.indexOf(opt.id);
        if (i >= 0) { ctx.selected.splice(i,1); el.classList.remove('selected'); }
        else { ctx.selected.push(opt.id); el.classList.add('selected'); }
        setCta('Continue', ctx.selected.length > 0, () => { stepIdx++; render(); });
      } else {
        list.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        if (step.slotsForChoice) ctx.slot = opt.id; else ctx.choice = opt.id;
        setCta('Continue', true, () => { stepIdx++; render(); });
      }
    };
    list.appendChild(el);
  });
  setCta('Continue', step.kind === 'multi' && (ctx.selected||[]).length > 0, () => { stepIdx++; render(); });
}

function renderAddress(step) {
  mainEl.innerHTML = `
    <h1>${resolveTitle(step.title)}</h1>
    ${step.lede ? `<p class="lede">${resolveTitle(step.lede)}</p>` : ''}
    <div class="field"><label>Street address</label><input id="addr1" placeholder="1234 Main St" autocomplete="address-line1"/></div>
    <div class="field"><label>City</label><input id="city" placeholder="San Diego" autocomplete="address-level2"/></div>
    <div class="field"><label>State</label><input id="state" placeholder="CA" autocomplete="address-level1" maxlength="2"/></div>
    <div class="field"><label>ZIP</label><input id="zip" placeholder="92101" autocomplete="postal-code" inputmode="numeric"/></div>
  `;
  const inputs = mainEl.querySelectorAll('input');
  function check() {
    const ok = [...inputs].every(i => i.value.trim().length > 0);
    setCta('Continue', ok, () => {
      ctx.address = {
        line1: mainEl.querySelector('#addr1').value,
        city:  mainEl.querySelector('#city').value,
        state: mainEl.querySelector('#state').value,
        zip:   mainEl.querySelector('#zip').value
      };
      stepIdx++; render();
    });
  }
  inputs.forEach(i => i.addEventListener('input', check));
  check();
}

function renderZip(step) {
  mainEl.innerHTML = `
    <h1>${resolveTitle(step.title)}</h1>
    ${step.lede ? `<p class="lede">${resolveTitle(step.lede)}</p>` : ''}
    <div class="field"><label>ZIP code</label><input id="zip" placeholder="92101" autocomplete="postal-code" inputmode="numeric" maxlength="5"/></div>
  `;
  const z = mainEl.querySelector('#zip');
  function check() {
    const ok = /^\d{5}$/.test(z.value.trim());
    setCta('Find locations', ok, () => { ctx.zip = z.value.trim(); stepIdx++; render(); });
  }
  z.addEventListener('input', check);
  check();
}

function renderHealthKit(step) {
  // Hide the page-level CTA. The sheet's "Allow" button advances the flow.
  document.querySelector('.footer').style.display = 'none';
  // Show a faint background page so it looks like a sheet over your app.
  mainEl.innerHTML = `
    <h1 style="opacity:0.35;">Connect Apple Health</h1>
    <p class="lede" style="opacity:0.35;">Approve the system permission sheet to continue.</p>
  `;

  const HK_CATEGORIES = [
    { id:'hr',       label:'Heart Rate',              color:'#FF2D55', icon:icon('heart')    },
    { id:'rhr',      label:'Resting Heart Rate',      color:'#FF2D55', icon:icon('heart')    },
    { id:'hrv',      label:'Heart Rate Variability', color:'#FF2D55', icon:icon('heart')    },
    { id:'vo2',      label:'VO2 Max',                 color:'#FF6B22', icon:icon('lungs')    },
    { id:'sleep',    label:'Sleep Analysis',          color:'#5856D6', icon:icon('bed')      },
    { id:'energy',   label:'Active Energy',           color:'#FF9500', icon:icon('flame')    },
    { id:'workouts', label:'Workouts',                color:'#FF9500', icon:icon('flame')    },
    { id:'steps',    label:'Steps',                   color:'#FF9500', icon:icon('flame')    },
    { id:'distance', label:'Walking + Running Distance', color:'#FF9500', icon:icon('flame') }
  ];

  const state = Object.fromEntries(HK_CATEGORIES.map(c => [c.id, false]));

  const sheet = document.createElement('div');
  sheet.className = 'hk-backdrop';
  sheet.innerHTML = `
    <div class="hk-sheet" role="dialog" aria-modal="true">
      <div class="hk-nav">
        <button id="hk-cancel">Cancel</button>
        <button id="hk-allow" class="right">Allow</button>
      </div>
      <div class="hk-scroll">
        <div class="hk-hero">
          <div class="hk-heart">${icon('heart')}</div>
          <div class="hk-title">Health Access</div>
          <div class="hk-sub">"Meridian" would like to access and update your Health data in the categories below.</div>
        </div>

        <div class="hk-section-header">ALLOW "MERIDIAN" TO READ DATA</div>
        <div class="hk-group" id="hk-read"></div>
        <div class="hk-footer-note">Meridian uses these signals to track recovery, fitness, and risk trajectory between visits.</div>
      </div>
    </div>
  `;
  document.body.appendChild(sheet);

  const group = sheet.querySelector('#hk-read');

  function makeRow(c, isMaster) {
    const row = document.createElement('div');
    row.className = 'hk-row' + (isMaster ? ' master' : '');
    row.innerHTML = `
      <div class="hk-row-icon" style="background:${c.color}">${c.icon}</div>
      <div class="hk-row-label">${c.label}</div>
      <div class="hk-toggle" data-id="${c.id}"></div>
    `;
    const tog = row.querySelector('.hk-toggle');
    tog.onclick = () => {
      if (isMaster) {
        const turnOn = !tog.classList.contains('on');
        sheet.querySelectorAll('.hk-toggle').forEach(t => {
          t.classList.toggle('on', turnOn);
          if (t.dataset.id && t.dataset.id !== 'master') state[t.dataset.id] = turnOn;
        });
      } else {
        tog.classList.toggle('on');
        state[c.id] = tog.classList.contains('on');
        const allOn = HK_CATEGORIES.every(cc => state[cc.id]);
        const masterTog = sheet.querySelector('.hk-toggle[data-id="master"]');
        masterTog.classList.toggle('on', allOn);
      }
    };
    return row;
  }

  group.appendChild(makeRow({id:'master', label:'Turn All Categories On', color:'#8E8E93', icon:icon('grid')}, true));
  HK_CATEGORIES.forEach(c => group.appendChild(makeRow(c, false)));

  sheet.querySelector('#hk-cancel').onclick = () => {
    sheet.remove();
    document.querySelector('.footer').style.display = '';
    stepIdx--; render();
  };
  sheet.querySelector('#hk-allow').onclick = () => {
    ctx.hk = state;
    sheet.remove();
    document.querySelector('.footer').style.display = '';
    stepIdx++; render();
  };
}

function renderOAuth(step) {
  document.querySelector('.footer').style.display = 'none';

  const flowOpts = flow.steps[0].options;
  const opt = flowOpts.find(o => o.id === ctx.choice) || {};
  const SCOPES = {
    garmin: ['Activities','Heart Rate','Sleep','Body Composition'],
    whoop:  ['Recovery','Strain','Sleep','Workouts'],
    oura:   ['Daily Readiness','Sleep','Heart Rate','Activity'],
    fitbit: ['Activity & Exercise','Heart Rate','Sleep','Weight']
  };
  const scopes = SCOPES[ctx.choice] || [];

  mainEl.innerHTML = `
    <h1 style="opacity:0.35;">Connect ${opt.brand || ''}</h1>
    <p class="lede" style="opacity:0.35;">Sign in and approve to continue.</p>
  `;

  const sheet = document.createElement('div');
  sheet.className = 'ow-backdrop';
  sheet.innerHTML = `
    <div class="ow-sheet" role="dialog" aria-modal="true">
      <div class="ow-urlbar">
        <button class="ow-cancel" id="ow-cancel">Cancel</button>
        <div class="ow-url"><span class="lock">🔒</span><span>${opt.host || ''}</span></div>
      </div>
      <div class="ow-body">
        <div class="ow-brand">
          <div class="ow-brand-mark" style="background:${opt.accent || '#000'}">${opt.icon || ''}</div>
          <div class="ow-brand-name">${opt.brand || ''}</div>
        </div>
        <h2 class="ow-h">Authorize Meridian</h2>
        <p class="ow-p">Meridian is requesting permission to read data from your ${opt.brand || ''} account. You can revoke access any time from your ${opt.brand || ''} settings.</p>
        <div class="ow-scopes">
          <div class="ow-scopes-title">Meridian will be able to read</div>
          <ul>
            ${scopes.map(s => `<li>${icon('check')}<span>${s}</span></li>`).join('')}
          </ul>
        </div>
        <div class="ow-actions">
          <button class="ow-btn secondary" id="ow-deny">Deny</button>
          <button class="ow-btn primary" id="ow-approve" style="background:${opt.accent || '#000'}">Authorize</button>
        </div>
      </div>
    </div>
  `;
  document.body.appendChild(sheet);

  sheet.querySelector('#ow-cancel').onclick = sheet.querySelector('#ow-deny').onclick = () => {
    sheet.remove();
    document.querySelector('.footer').style.display = '';
    stepIdx--; render();
  };
  sheet.querySelector('#ow-approve').onclick = () => {
    ctx.oauth = { provider: ctx.choice, scopes };
    sheet.remove();
    document.querySelector('.footer').style.display = '';
    stepIdx++; render();
  };
}

function renderSuccess(step) {
  mainEl.innerHTML = `
    <div class="success">
      <div class="success-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 10 17 19 7"/></svg>
      </div>
      <h1>${resolveTitle(step.title)}</h1>
      <p>${resolveTitle(step.body || '')}</p>
    </div>
  `;
  setCta('Done', true, complete);
}

function complete() {
  const ret = params.get('return');
  const url = ret === 'hub' ? `health-picture.html?completed=${flowId}` : 'health-picture.html';
  location.href = url;
}

backEl.onclick = () => {
  if (stepIdx === 0) { history.length > 1 ? history.back() : (location.href = 'health-picture.html'); return; }
  stepIdx--; render();
};

render();
</script>
</body>
</html>
