<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Meridian · Figma Onboarding Prototype</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: #000;
    color: #fff;
    font-family: Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    overflow: hidden;
  }
  body { height: 100vh; height: 100dvh; }
  #app {
    height: 100vh;
    height: 100dvh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  .stage {
    position: relative;
    height: 100vh;
    height: 100dvh;
    max-height: 100dvh;
    width: min(100vw, calc(100dvh * var(--ratio)));
    max-width: 100vw;
    overflow: hidden;
    background: #000;
  }
  .screen-img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center;
    user-select: none;
    pointer-events: none;
  }
  .hotspot {
    position: absolute;
    border: 0;
    background: rgba(255,255,255,0);
    cursor: pointer;
    padding: 0;
  }
  .hotspot:focus-visible { outline: 2px solid rgba(255,255,255,0.7); outline-offset: 2px; }
  .debug .hotspot { background: rgba(80,180,255,0.18); outline: 1px solid rgba(80,180,255,0.45); }
</style>
</head>
<body>
<div id="app"></div>
<script>
const A = 'assets/figma-onboarding-exact/';
const H = 'assets/onboarding-refs/';

const order = ['patient','genetic','wearables','physician','labs'];
let done = new Set(JSON.parse(localStorage.getItem('meridian.figmaOnboarding.done') || '[]'));
let current = 'hub';

function saveDone() {
  localStorage.setItem('meridian.figmaOnboarding.done', JSON.stringify([...done]));
}
function resetIfNeeded() {
  const p = new URLSearchParams(location.search);
  if (p.has('reset')) {
    done = new Set();
    saveDone();
    history.replaceState(null, '', location.pathname + location.search.replace(/[?&]reset=1/, '').replace(/[?&]reset=true/, ''));
  }
}
resetIfNeeded();

const hubImages = ['hub0','hub1','hub2','hub3','hub4','hub5'];
function hubKey() { return hubImages[Math.min(done.size, 5)]; }
function complete(section) {
  done.add(section);
  saveDone();
  show('hub');
}

const screens = {
  hub: {
    img: () => A + hubKey() + '.png', w: 780, h: 1688,
    areas: () => [
      area(0.10,0.43,0.80,0.075, () => show('patient_01'), 'Patient History'),
      area(0.10,0.51,0.80,0.075, () => show('genetic_intro'), 'Genetic Analysis Kit'),
      area(0.10,0.59,0.80,0.075, () => show('wearables_start'), 'Wearables'),
      area(0.10,0.67,0.80,0.075, () => show('physician'), 'Meet your physician'),
      area(0.10,0.75,0.80,0.075, () => show('labs_intro'), 'Blood Labs')
    ]
  },

  patient_01: imgStep(H+'01-bio-sex.png', 648, 1248, 'patient_02'),
  patient_02: imgStep(H+'02-height.png', 648, 1248, 'patient_03'),
  patient_03: imgStep(H+'03-weight.png', 648, 1248, 'patient_04'),
  patient_04: imgStep(H+'04-exercise.png', 648, 1248, 'patient_05'),
  patient_05: imgStep(H+'05-diet.png', 648, 1248, 'patient_06'),
  patient_06: imgStep(H+'06-sleep.png', 648, 1248, 'patient_07'),
  patient_07: imgStep(H+'07-alcohol-tobacco.png', 648, 1248, 'patient_08'),
  patient_08: imgStep(H+'08-meds-yesno.png', 648, 1248, 'patient_09'),
  patient_09: imgStep(H+'09-meds-name.png', 648, 1248, 'patient_10'),
  patient_10: imgStep(H+'10-meds-dosage.png', 648, 1248, 'patient_11'),
  patient_11: imgStep(H+'11-meds-loop.png', 648, 1248, 'patient_12'),
  patient_12: imgStep(H+'12-supps-yesno.png', 648, 1248, 'patient_13'),
  patient_13: imgStep(H+'13-family-heart.png', 648, 1248, 'patient_14'),
  patient_14: imgStep(H+'14-family-diabetes.png', 648, 1248, 'patient_15'),
  patient_15: imgStep(H+'15-anything-else.png', 648, 1248, 'patient_16'),
  patient_16: {
    img: H+'16-review.png', w: 648, h: 1248,
    areas: () => [
      area(0.08,0.11,0.16,0.06, () => show('hub'), 'Back'),
      area(0.10,0.34,0.80,0.08, () => show('patient_edit_option'), 'Edit option'),
      area(0.10,0.42,0.80,0.08, () => show('patient_edit_wheel'), 'Edit wheel'),
      area(0.10,0.58,0.80,0.08, () => show('patient_edit_list'), 'Edit list'),
      area(0.10,0.72,0.80,0.08, () => show('patient_edit_text'), 'Edit text'),
      area(0.10,0.89,0.80,0.08, () => complete('patient'), 'Done')
    ]
  },
  patient_edit_option: modalStep(H+'17-edit-bottomsheet.png', 648, 1248, 'patient_16'),
  patient_edit_wheel: modalStep(H+'18-edit-wheel.png', 648, 1248, 'patient_16'),
  patient_edit_list: modalStep(H+'19-edit-multiline.png', 648, 1248, 'patient_16'),
  patient_edit_text: modalStep(H+'20-edit-textfield.png', 648, 1248, 'patient_16'),

  genetic_intro: imgStep(A+'genetic_intro.png', 780, 1688, 'genetic_panel'),
  genetic_panel: imgStep(A+'genetic_panel.png', 780, 1688, 'genetic_mda'),
  genetic_mda: imgStep(A+'genetic_mda.png', 780, 1688, 'genetic_biobank'),
  genetic_biobank: imgStep(A+'genetic_biobank.png', 780, 1688, 'genetic_sign'),
  genetic_sign: {
    img: A+'genetic_sign.png', w: 780, h: 1688,
    areas: () => [
      area(0.08,0.08,0.16,0.08, () => show('genetic_biobank'), 'Back'),
      area(0.08,0.85,0.84,0.09, () => complete('genetic'), 'Sign and Accept')
    ]
  },

  wearables_start: {
    img: A+'wearables_start.png', w: 648, h: 1248,
    areas: () => wearableAreas('wearables_apple_select', 'wearables_terra_login')
  },
  wearables_apple_select: imgStep(A+'wearables_apple_select.png', 648, 1248, 'wearables_apple_perm'),
  wearables_apple_perm: imgStep(A+'wearables_apple_perm.png', 648, 1248, 'wearables_done_apple'),
  wearables_done_apple: {
    img: A+'wearables_done_apple.png', w: 648, h: 1248,
    areas: () => [
      area(0.08,0.08,0.16,0.08, () => show('wearables_start'), 'Back'),
      area(0.08,0.88,0.84,0.08, () => complete('wearables'), 'Done adding wearables')
    ]
  },
  wearables_terra_login: imgStep(A+'wearables_terra_login.png', 648, 1248, 'wearables_terra_perm'),
  wearables_terra_perm: imgStep(A+'wearables_terra_perm.png', 648, 1248, 'wearables_done_multi'),
  wearables_done_multi: {
    img: A+'wearables_done_multi.png', w: 648, h: 1248,
    areas: () => [
      area(0.08,0.08,0.16,0.08, () => show('wearables_start'), 'Back'),
      area(0.08,0.88,0.84,0.08, () => complete('wearables'), 'Done adding wearables')
    ]
  },

  physician: {
    img: A+'physician.png', w: 648, h: 1248,
    areas: () => [
      area(0.08,0.08,0.16,0.08, () => show('hub'), 'Back'),
      area(0.08,0.88,0.84,0.08, () => complete('physician'), 'Continue')
    ]
  },

  labs_intro: imgStep(A+'labs_intro.png', 780, 1688, 'labs_request'),
  labs_request: imgStep(A+'labs_request.png', 780, 1688, 'labs_result'),
  labs_result: {
    img: A+'labs_result.png', w: 780, h: 1688,
    areas: () => [
      area(0.08,0.08,0.16,0.08, () => show('labs_request'), 'Back'),
      area(0.08,0.86,0.84,0.09, () => complete('labs'), 'Back to hub')
    ]
  }
};

function imgStep(img, w, h, next) {
  return {
    img, w, h,
    areas: () => [
      area(0.08,0.08,0.16,0.08, () => show('hub'), 'Back'),
      area(0.06,0.34,0.88,0.52, () => show(next), 'Next'),
      area(0.08,0.86,0.84,0.10, () => show(next), 'Continue')
    ]
  };
}
function modalStep(img, w, h, backTo) {
  return {
    img, w, h,
    areas: () => [
      area(0.08,0.08,0.16,0.08, () => show(backTo), 'Back'),
      area(0.08,0.74,0.84,0.20, () => show(backTo), 'Save')
    ]
  };
}
function wearableAreas(appleNext, otherNext) {
  return [
    area(0.08,0.08,0.16,0.08, () => show('hub'), 'Back'),
    area(0.06,0.30,0.40,0.18, () => show(appleNext), 'Apple Watch'),
    area(0.52,0.30,0.40,0.18, () => show(otherNext), 'Samsung'),
    area(0.06,0.49,0.40,0.18, () => show(otherNext), 'Garmin'),
    area(0.52,0.49,0.40,0.18, () => show(otherNext), 'Fitbit'),
    area(0.06,0.68,0.40,0.18, () => show(otherNext), 'Oura'),
    area(0.52,0.68,0.40,0.18, () => show(otherNext), 'Whoop'),
    area(0.08,0.88,0.84,0.08, () => complete('wearables'), 'Skip or done')
  ];
}
function area(x,y,w,h,onClick,label) { return {x,y,w,h,onClick,label}; }

function show(key) {
  current = key;
  const s = screens[key] || screens.hub;
  const img = typeof s.img === 'function' ? s.img() : s.img;
  const ratio = s.w / s.h;
  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="stage" style="--ratio:${ratio}">
      <img class="screen-img" src="${img}" alt="${key}" />
    </div>
  `;
  const stage = app.querySelector('.stage');
  for (const a of s.areas()) {
    const b = document.createElement('button');
    b.className = 'hotspot';
    b.type = 'button';
    b.setAttribute('aria-label', a.label || 'Continue');
    b.style.left = (a.x * 100) + '%';
    b.style.top = (a.y * 100) + '%';
    b.style.width = (a.w * 100) + '%';
    b.style.height = (a.h * 100) + '%';
    b.onclick = a.onClick;
    stage.appendChild(b);
  }
}

window.addEventListener('keydown', e => {
  if (e.key === 'd') document.body.classList.toggle('debug');
  if (e.key === 'Escape') show('hub');
});
show('hub');
</script>
</body>
</html>
